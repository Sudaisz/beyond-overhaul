<!DOCTYPE html>
<html lang="en">
<head>

<meta property="og:title" content="Beyondthy Community">
<meta property="og:description" content="Community, payments, updates and discussions.">
<meta property="og:image" content="social-preview.jpg">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AniVerse Community</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="script.js" defer></script>
</head>
<body>
    <!-- Ad Popup -->
    <div id="adPopup" class="ad-popup">
        <div class="ad-content">
            <span class="close-ad" onclick="closeAd()">&times;</span>
            <h3 id="adTitle"></h3>
            <p id="adText"></p>
            <a id="adLink" class="ad-btn" target="_blank">Join Now</a>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-section">
                <h1><i class="fas fa-robot"></i> AniVerse</h1>
                <p class="tagline">Anime Community & Financial Insights</p>
            </div>

            <div class="form-container">
                <div class="form-tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                    <button class="tab-btn" onclick="switchTab('register')">Register</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form active">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="loginUsername" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
                    </div>
                    <button type="button" class="btn-primary" onclick="loginUser()">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="auth-form">
                    <div class="input-group">
                        <i class="fas fa-user-plus"></i>
                        <input type="text" id="regUsername" placeholder="Choose Username" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Create Password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('regPassword', this)"></i>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required>
                    </div>
                    <button type="button" class="btn-primary" onclick="registerUser()">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>

                <div class="auth-footer">
                    <p><a href="#" onclick="showAd(true)">View Special Offer</a></p>
                    <p class="note">Demo: Users stored in browser localStorage</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            
            if(tab === 'login') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
<footer style="text-align:center;padding:20px">Owner: <a href="https://t.me/deekingbeyond">@deekingbeyond</a></footer></body>
</html>
